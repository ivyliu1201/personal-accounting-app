spring:
  application:
    name: personal-accounting-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:15432/personal_accounting}
    username: ${SPRING_DATASOURCE_USERNAME:personal_accounting}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me}
  flyway:
    enabled: true
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:false}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        hbm2ddl:
          auto: none
    open-in-view: false

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

app:
  auth:
    dev-user-id: ${APP_DEV_USER_ID:dev-user}
    dev-fallback-enabled: ${APP_AUTH_DEV_FALLBACK_ENABLED:true}
    firebase-enabled: ${APP_FIREBASE_ENABLED:false}
    firebase-service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}
    allowed-emails: ${APP_ALLOWED_USER_EMAILS:}
