services:
  postgres:
    image: postgres:16-alpine
    container_name: personal-accounting-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-personal_accounting}
      POSTGRES_USER: ${POSTGRES_USER:-personal_accounting}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-personal_accounting} -d ${POSTGRES_DB:-personal_accounting}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: personal-accounting-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-personal_accounting}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-personal_accounting}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      APP_DEV_USER_ID: ${APP_DEV_USER_ID:-dev-user}
      APP_AUTH_DEV_FALLBACK_ENABLED: ${APP_AUTH_DEV_FALLBACK_ENABLED:-true}
      APP_FIREBASE_ENABLED: ${APP_FIREBASE_ENABLED:-false}
      APP_ALLOWED_USER_EMAILS: ${APP_ALLOWED_USER_EMAILS:-}
      FIREBASE_SERVICE_ACCOUNT_PATH: ${FIREBASE_SERVICE_ACCOUNT_PATH:-}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
    container_name: personal-accounting-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend

volumes:
  postgres-data:
