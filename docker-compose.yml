services:
  postgres:
    image: postgres:16-alpine
    container_name: personal-accounting-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-personal_accounting}
      POSTGRES_USER: ${POSTGRES_USER:-personal_accounting}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-personal_accounting} -d ${POSTGRES_DB:-personal_accounting}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
